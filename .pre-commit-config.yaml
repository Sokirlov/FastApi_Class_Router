exclude: '^exemples/'

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [ --fix]
        exclude: ^exemples/
      - id: ruff-format
        exclude: ^exemples/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        additional_dependencies: [fastapi, pydantic]